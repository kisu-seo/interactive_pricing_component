<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Pricing Component | 시니어 멘토 AI</title>

  <!-- Google 폰트: Manrope -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind 환경 설정 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          colors: {
            // 프로젝트 공통 컬러 팔레트
            'soft-cyan': 'hsl(174, 77%, 80%)',
            'strong-cyan': 'hsl(174, 86%, 45%)',
            'light-red-bg': 'hsl(14, 92%, 95%)',
            'light-red-text': 'hsl(15, 100%, 70%)',
            'pale-blue': 'hsl(226, 100%, 87%)',
            'white': 'hsl(0, 0%, 100%)',
            'very-pale-blue': 'hsl(230, 100%, 99%)',
            'empty-slider': 'hsl(224, 65%, 95%)',
            'toggle-bg': 'hsl(223, 50%, 87%)',
            'grayish-blue': 'hsl(226, 20%, 60%)',
            'dark-blue': 'hsl(227, 35%, 25%)',
          }
        }
      }
    }
  </script>

  <!-- 슬라이더 컴포넌트 커스텀 CSS -->
  <style>
    /* 기본 브라우저 스타일 초기화 (커스텀 스타일링을 위한 필수 전제조건) */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      background: transparent;
    }

    input[type=range]:focus {
      outline: none;
    }

    /* Webkit - 슬라이더 트랙 */
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 8px;
      cursor: pointer;
      border-radius: 999px;
      /* 🚨 [유지보수] 자바스크립트에서 주입해주는 '--track-bg' 변수로 동적 그라데이션을 채웁니다. */
      background: var(--track-bg, hsl(224, 65%, 95%));
    }

    /* Webkit - 슬라이더 손잡이(Thumb) */
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      height: 40px;
      width: 40px;
      border-radius: 50%;
      background-color: hsl(174, 86%, 45%);
      background-image: url('./images/icon-slider.svg');
      background-position: center;
      background-repeat: no-repeat;
      cursor: pointer;
      margin-top: -16px; /* 트랙과 손잡이의 중앙 정렬을 위한 높이 계산값 */
      box-shadow: 0px 15px 30px rgba(16, 213, 194, 0.6);
      transition: background-color 0.3s ease;
    }

    input[type=range]::-webkit-slider-thumb:hover {
      background-color: hsl(174, 77%, 80%);
    }

    input[type=range]:active::-webkit-slider-thumb {
      cursor: grabbing; /* 클릭 드래그 시 커서 피드백 제공 */
    }

    /* Firefox - 슬라이더 트랙 및 손잡이 (크로스 브라우징을 위한 코드 중복) */
    input[type=range]::-moz-range-track {
      width: 100%;
      height: 8px;
      cursor: pointer;
      border-radius: 999px;
      background: var(--track-bg, hsl(224, 65%, 95%));
    }

    input[type=range]::-moz-range-thumb {
      height: 40px;
      width: 40px;
      border-radius: 50%;
      border: none;
      background-color: hsl(174, 86%, 45%);
      background-image: url('./images/icon-slider.svg');
      background-position: center;
      background-repeat: no-repeat;
      cursor: pointer;
      box-shadow: 0px 15px 30px rgba(16, 213, 194, 0.6);
      transition: background-color 0.3s ease;
    }

    input[type=range]::-moz-range-thumb:hover {
      background-color: hsl(174, 77%, 80%);
    }

    /* 🚨 [유지보수] 데스크탑 화면(md: 768px 이상)에서의 손잡이 3단계 색상 지정 (기본, 호버, 액티브) */
    @media (min-width: 768px) {
      /* Webkit 기반 브라우저 */
      input[type=range]::-webkit-slider-thumb {
        background-color: #10D8C4;
      }
      input[type=range]::-webkit-slider-thumb:hover {
        background-color: #7AEADF;
      }
      input[type=range]:active::-webkit-slider-thumb {
        background-color: #24AEA1;
      }

      /* Firefox 브라우저 */
      input[type=range]::-moz-range-thumb {
        background-color: #10D8C4;
      }
      input[type=range]::-moz-range-thumb:hover {
        background-color: #7AEADF;
      }
      input[type=range]:active::-moz-range-thumb {
        background-color: #24AEA1;
      }
    }
  </style>
</head>

<body
  class="bg-[#fafbff] text-grayish-blue font-sans antialiased min-h-screen relative flex flex-col items-center overflow-x-hidden">

  <!-- ========================================== -->
  <!-- 1. 배경 레이어 (패턴 뷰 영역)                    -->
  <!-- ========================================== -->
  <div class="absolute top-0 left-0 w-full h-[400px] md:h-[449px] bg-[#f1f5fe] rounded-bl-[191.5px] z-[-2] overflow-hidden">
    <!-- 🚨 [A11y] aria-hidden="true": 스크린 리더가 장식용 이미지를 무시하도록 숨김 처리 -->
    <img src="./images/bg-pattern.svg" alt="" aria-hidden="true" class="w-full h-full">
  </div>

  <!-- ========================================== -->
  <!-- 2. 헤더 섹션 (로고 및 설명 텍스트)                 -->
  <!-- ========================================== -->
  <header
    class="relative w-full md:w-[395px] max-w-[540px] px-6 md:px-0 text-center mt-0 mb-16 md:mb-[92px] flex flex-col justify-center items-center pt-[89px] md:pt-[104px] pb-0 z-0">
    <!-- 배경 원형 데코레이션 -->
    <img src="./images/pattern-circles.svg" alt="" aria-hidden="true" class="absolute z-[-1]">

    <h1 class="text-[20px] md:text-[28px] font-extrabold text-dark-blue mb-2 md:mb-[12px]">
      Simple, traffic-based pricing
    </h1>
    <p class="text-[13px] md:text-[15px] max-w-[200px] md:max-w-none font-semibold text-[#848EAD] leading-6">
      Sign-up for our 30-day trial.<br class="md:hidden"> No credit card required.
    </p>
  </header>

  <!-- ========================================== -->
  <!-- 3. 메인 가격 책정 컴포넌트 영역                    -->
  <!-- ========================================== -->
  <main class="w-full px-6 z-10 pb-[88px] mt-0 md:mt-0">

    <section
      class="w-full max-w-[540px] shadow-[0_20px_40px_-5px_rgba(200,200,200,0.3)] bg-white mx-auto rounded-lg pt-[34px] md:pt-10 mb-0 pb-8 flex flex-col">

      <!-- --------------------------------- -->
      <!-- 블록 A: 상단 구역 (조회수, 슬라이더, 요금) -->
      <!-- --------------------------------- -->
      <div
        class="grid grid-cols-1 md:grid-cols-2 gap-y-[40px] md:mb-[56px] md:gap-y-10 items-center justify-items-center md:justify-items-stretch px-6 md:px-10 mb-[34px] w-full">

        <h2 id="pageviews-label"
          class="md:justify-self-start text-[12px] md:text-[14px] text-[#848EAD] tracking-[1.5px] md:tracking-[2px] font-extrabold uppercase row-start-1 md:col-start-1 md:row-start-1">
          <span id="pageviews">100K</span> PAGEVIEWS
        </h2>

        <!-- 가격 출력 영역 -->
        <div id="price-container"
          class="md:justify-self-end flex items-center gap-[10px] justify-center font-extrabold text-dark-blue row-start-3 md:col-start-2 md:row-start-1">
          <span class="text-[32px] md:text-[40px] tracking-tight" id="price">$16.00</span>
          <span class="text-[14px] md:text-[16px] text-grayish-blue font-semibold whitespace-nowrap">/ month</span>
        </div>

        <!-- 슬라이더 바 구역 -->
        <div class="w-full relative col-span-1 md:col-span-2 row-start-2 md:row-start-2 flex items-center mt-0">
          <!-- 🚨 [A11y] aria-labelledby: 어떤 제목(라벨)에 종속된 컨트롤인지 시맨틱 연결 구조를 확립함 -->
          <input type="range" id="volume" min="0" max="4" step="1" value="2" aria-labelledby="pageviews-label" class="w-full">
        </div>
      </div>

      <!-- --------------------------------- -->
      <!-- 블록 B: 중단 구역 (월별/연간 결제 토글 버튼) -->
      <!-- --------------------------------- -->
      <div
        class="pl-[44px] pr-0 md:pl-[154px] md:pr-0 md:ml-0 flex border-red items-center justify-start text-[12px] md:text-[14px] text-grayish-blue font-semibold mb-[38px] md:mb-10 w-full">
        <span>Monthly Billing</span>

        <!-- 커스텀 토글 스위치 -->
        <!-- 🚨 [유지보수] peer, peer-checked 기반의 JS 없는 상태 관리 체계를 이용한 CSS 토글이므로 HTML 구조(input - div 순서) 변경 금지 -->
        <label for="billing-toggle" class="relative inline-flex items-center cursor-pointer mx-3 md:mx-4">
          <!-- 🚨 [A11y] sr-only: 체크박스를 시각적으로는 지우지만 눈이 불편한 사용자의 스크린리더기는 작동하도록 접근성 방어 -->
          <input type="checkbox" id="billing-toggle" class="sr-only peer" aria-label="연간 결제 할인 적용">

          <div class="w-11 h-6 bg-toggle-bg hover:bg-soft-cyan rounded-full peer peer-checked:after:translate-x-[18px] 
          after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:rounded-full after:h-[16px] after:w-[16px] 
          after:transition-transform duration-300 peer-checked:bg-strong-cyan"></div>
        </label>

        <span class="flex items-center relative">
          Yearly Billing
          <!-- 연간 결제 할인율 뱃지 -->
          <span
            class="bg-light-red-bg text-light-red-text rounded-full text-[10px] font-extrabold px-[6px] py-[1.5px] ml-1.5 md:ml-2 absolute right-[-45px] md:right-[-90px] whitespace-nowrap">
            <span class="md:hidden">-25%</span>
            <span class="hidden md:inline">25% discount</span>
          </span>
        </span>
      </div>

      <!-- 시각적 구분선 -->
      <div class="h-[1px] bg-empty-slider w-full mb-6 md:mb-8"></div>

      <!-- --------------------------------- -->
      <!-- 블록 C: 하단 구역 (기능 리스트, 구매 토큰 액션) -->
      <!-- --------------------------------- -->
      <div class="px-6 md:px-0 md:w-[448px] md:mx-auto flex flex-col md:flex-row items-center justify-between text-[12px] md:text-[13px] pb-0">

        <!-- 기능 혜택 리스트 -->
        <ul class="flex flex-col gap-[11px] items-center md:items-start text-grayish-blue mb-8 md:mb-0 font-semibold">
          <li class="flex items-center gap-4">
            <img src="./images/icon-check.svg" alt="" aria-hidden="true" class="w-2.5 h-2 mt-0.5">
            Unlimited websites
          </li>
          <li class="flex items-center gap-4">
            <img src="./images/icon-check.svg" alt="" aria-hidden="true" class="w-2.5 h-2 mt-0.5">
            100% data ownership
          </li>
          <li class="flex items-center gap-4">
            <img src="./images/icon-check.svg" alt="" aria-hidden="true" class="w-2.5 h-2 mt-0.5">
            Email reports
          </li>
        </ul>

        <!-- 구독 시작 액션 버튼(CTA) -->
        <button
          class="bg-dark-blue text-pale-blue w-[170px] h-[41px] rounded-full font-bold md:text-[12px] hover:text-white transition-colors duration-300 tracking-[0.5px]">
          Start my trial
        </button>

      </div>
    </section>
  </main>

  <!-- 기능 구현 파이프라인(스크립트) 불러오기 -->
  <script src="./main.js"></script>
</body>

</html>
